<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SASE PWA QR</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      background: #f5f8fb;
      color: #101821;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(8, 30, 56, 0.12);
      text-align: center;
      max-width: 360px;
    }
    img {
      width: 280px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
      border: 8px solid white;
    }
    code {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Scan to open SASE</h1>
    <p>Use your phone camera while this computer is running the local server.</p>
    <img src="./sase-pwa-qr.png" alt="QR code for the SASE PWA">
    <p><code>http://172.17.1.40:8000</code></p>
  </div>
</body>
</html>
